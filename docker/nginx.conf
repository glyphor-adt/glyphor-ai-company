server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (must be repeated in location blocks that use add_header,
    # because nginx's add_header in a location block overrides server-level directives)
    # X-Frame-Options removed — Teams embeds the dashboard in an iframe.
    # CSP frame-ancestors restricts embedding to Teams and same-origin only.
    add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=()" always;

    # SPA fallback — all routes serve index.html
    location /admin/ {
        proxy_pass https://glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
    }

    location /api/ {
        proxy_pass https://glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
    }

    # Governance & eval endpoints — proxy to scheduler
    location /agent-evals/ {
        proxy_pass https://glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
    }

    location /gtm-readiness/ {
        proxy_pass https://glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host glyphor-scheduler-610179349713.us-central1.run.app;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
    }

    # No cache for index.html (picks up new deploys)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(self), camera=()" always;
    }

    # Service worker — must never be cached
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/javascript";
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # PWA manifest
    location = /manifest.json {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/manifest+json";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Health check for Cloud Run
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
