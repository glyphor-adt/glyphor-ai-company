steps:
  # Build scheduler
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--progress=plain'
      - '-f'
      - 'docker/Dockerfile.scheduler'
      - '-t'
      - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/scheduler:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
    id: 'build-scheduler'

  # Build voice-gateway
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--progress=plain'
      - '-f'
      - 'docker/Dockerfile.voice-gateway'
      - '-t'
      - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/voice-gateway:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
    id: 'build-voice-gateway'

  # Build worker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--progress=plain'
      - '-f'
      - 'docker/Dockerfile.worker'
      - '-t'
      - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/worker:latest'
      - '.'
    id: 'build-worker'

  # Build dashboard
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--progress=plain'
      - '-f'
      - 'docker/Dockerfile.dashboard'
      - '--build-arg'
      - 'VITE_SCHEDULER_URL=https://glyphor-scheduler-610179349713.us-central1.run.app'
      - '--build-arg'
      - 'VITE_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - '-t'
      - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/dashboard:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
    id: 'build-dashboard'

images:
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/scheduler:latest'
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/voice-gateway:latest'
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/worker:latest'
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/dashboard:latest'

# Improved logging and reliability
options:
  logging: CLOUD_LOGGING_ONLY
  logStreamingOption: STREAM_ON

timeout: '1200s'
