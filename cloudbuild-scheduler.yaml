steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'docker/Dockerfile.scheduler', '-t', 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/scheduler:latest', '.']
  - name: 'node:20'
    entrypoint: 'npx'
    args: ['tsx', 'scripts/verify-runtime-cloudrun-env.ts']
    id: validate-runtime-cloudrun
images:
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/scheduler:latest'
options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
