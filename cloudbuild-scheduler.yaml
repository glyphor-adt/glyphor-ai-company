steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'docker/Dockerfile.scheduler', '-t', 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/scheduler:latest', '.']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: validate-runtime-cloudrun
    allowFailure: true
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Runtime Cloud Run pre-deploy validation (warn-only) ==="
        REGION=us-central1
        PROJECT=ai-glyphor-company
        ERRORS=0

        get_env_val() {
          # $1=service $2=var-name
          gcloud run services describe "$$1" --region="$$REGION" --project="$$PROJECT" \
            --format="value(spec.template.spec.containers[0].env)" 2>/dev/null \
          | tr ',' '\n' \
          | grep "^$$2=" | head -1 | cut -d= -f2- || true
        }

        check() {
          local svc="$$1" label="$$2" val
          val=$$(get_env_val "$$svc" "$$label")
          if [ -z "$$val" ]; then
            echo "  WARN missing: $$svc / $$label"
            ERRORS=$$((ERRORS+1))
          else
            echo "  OK $$svc / $$label"
          fi
        }

        check glyphor-scheduler WORKER_URL
        check glyphor-scheduler WORKER_SHARED_SECRET
        check glyphor-worker WORKER_SHARED_SECRET
        check glyphor-worker WORKER_OIDC_SERVICE_ACCOUNT_EMAIL
        check glyphor-worker VERCEL_API_TOKEN
        check glyphor-worker VERCEL_TEAM_ID
        check glyphor-scheduler AWS_ACCESS_KEY_ID
        check glyphor-scheduler AWS_SECRET_ACCESS_KEY

        echo "=== $$ERRORS warning(s) — step is warn-only, deploy continues ==="
        exit 0
images:
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/scheduler:latest'
options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
