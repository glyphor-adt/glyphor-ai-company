    args: ['build', '-f', 'docker/Dockerfile.graphrag-indexer', '-t', 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/graphrag-indexer:latest', '.']
images:
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/graphrag-indexer:latest'
options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
