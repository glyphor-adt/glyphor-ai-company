steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--progress=plain'
      - '-f'
      - 'docker/Dockerfile.voice-gateway'
      - '-t'
      - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/voice-gateway:latest'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/voice-gateway:latest'

# Improved logging to capture detailed build output
options:
  logging: CLOUD_LOGGING_ONLY
  logStreamingOption: STREAM_ON

timeout: '600s'
