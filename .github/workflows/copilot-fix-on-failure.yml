name: Auto-fix failures with Copilot

on:
  workflow_run:
    workflows: ["Build & Deploy to Cloud Run"]
    types: [completed]
  check_suite:
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  create-fix-issue-workflow:
    # Trigger when a GitHub Actions workflow failed on main
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Download failed run logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"

          # Download logs and extract the build failure
          gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}/logs" > logs.zip || true
          if [ -f logs.zip ]; then
            unzip -o logs.zip -d run-logs 2>/dev/null || true
            LOG_SNIPPET=$(grep -rli "error" run-logs/ | head -3 | xargs -I{} tail -80 {} 2>/dev/null | tail -120)
          fi

          if [ -z "$LOG_SNIPPET" ]; then
            LOG_SNIPPET="Could not extract logs automatically. See the failed run link below."
          fi

          echo "$LOG_SNIPPET" > /tmp/log_snippet.txt

      - name: Check for existing open issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "copilot-fix" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Existing open fix issue #$EXISTING found â€” skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue and assign Copilot
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          LOG_SNIPPET=$(cat /tmp/log_snippet.txt)

          ISSUE_BODY=$(cat <<ENDOFBODY
          ## Build failure on \`main\`

          The **Build & Deploy to Cloud Run** workflow failed.

          **Failed run:** ${RUN_URL}
          **Commit:** ${{ github.event.workflow_run.head_sha }}

          ### Build log excerpt
          \`\`\`
          ${LOG_SNIPPET}
          \`\`\`

          ### What to do
          1. Look at the build errors above and in the linked workflow run
          2. Identify the root cause (e.g. TypeScript compilation errors, duplicate exports, missing imports)
          3. Fix the source files
          4. Ensure \`npx turbo build\` passes with no errors
          ENDOFBODY
          )

          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "fix: build failure on main ($(date +%Y-%m-%d))" \
            --body "$ISSUE_BODY" \
            --label "bug,copilot,copilot-fix" \
            --assignee "Copilot")

          echo "Created issue: $ISSUE_URL"

  create-fix-issue-check:
    # Trigger when an external check (Supabase, etc.) fails on main
    if: >
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'failure' &&
      github.event.check_suite.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Get failed check details
        id: details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_NAME="${{ github.event.check_suite.app.name }}"
          HEAD_SHA="${{ github.event.check_suite.head_sha }}"

          # Get check run details for this suite
          CHECK_RUNS=$(gh api \
            "/repos/${{ github.repository }}/check-suites/${{ github.event.check_suite.id }}/check-runs" \
            --jq '.check_runs[] | select(.conclusion == "failure") | {name: .name, output_title: .output.title, output_summary: .output.summary, details_url: .details_url}' 2>/dev/null || echo "")

          echo "APP_NAME=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "$CHECK_RUNS" > /tmp/check_details.txt

      - name: Check for existing open issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_NAME="${{ steps.details.outputs.APP_NAME }}"
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "copilot-fix" \
            --state open \
            --search "$APP_NAME failure" \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue and assign Copilot
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_NAME="${{ steps.details.outputs.APP_NAME }}"
          HEAD_SHA="${{ steps.details.outputs.HEAD_SHA }}"
          CHECK_DETAILS=$(cat /tmp/check_details.txt)

          ISSUE_BODY=$(cat <<ENDOFBODY
          ## External check failure on \`main\`

          The **${APP_NAME}** check failed.

          **Commit:** ${HEAD_SHA}

          ### Check details
          \`\`\`json
          ${CHECK_DETAILS}
          \`\`\`

          ### What to do
          1. Review the check failure details above
          2. Investigate the root cause (e.g. migration errors, schema issues, configuration problems)
          3. Fix the relevant files
          4. Ensure the check passes on the next push
          ENDOFBODY
          )

          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "fix: ${APP_NAME} check failure on main ($(date +%Y-%m-%d))" \
            --body "$ISSUE_BODY" \
            --label "bug,copilot,copilot-fix" \
            --assignee "Copilot")

          echo "Created issue: $ISSUE_URL"
