name: Request Copilot Review

on:
  pull_request_target:
    types: [opened, ready_for_review]
    branches: [main]

permissions:
  pull-requests: write

jobs:
  assign-copilot:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Request Copilot as PR reviewer
          gh api \
            --method POST \
            "repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f 'reviewers[]=Copilot' 2>/dev/null || echo "Note: Could not request Copilot review."

          echo "Copilot review requested for PR #${PR_NUMBER}."
