name: Request Copilot Review

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [main]

permissions:
  pull-requests: write

jobs:
  assign-copilot:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Try the reviewers API with the correct bot name
          gh api \
            --method POST \
            "repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f '{"reviewers":["copilot-swe-agent[bot]"]}' 2>/dev/null || true

          # Also enable Copilot code review via the PR reviewer request
          gh api \
            --method POST \
            "repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f '{"reviewers":["copilot-pull-request-reviewer[bot]"]}' 2>/dev/null || true

          echo "Copilot review requested for PR #${PR_NUMBER}."
          echo "Note: Copilot code review must also be enabled in repo settings under Code review > Copilot."
