name: Request Copilot Review

# Copilot auto-review only triggers on non-draft PRs.
# Copilot coding agent always creates drafts, so this workflow
# marks them ready → which triggers the auto-review setting.

on:
  pull_request_target:
    types: [opened, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  mark-ready-and-request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Mark draft PR ready & request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          IS_DRAFT="${{ github.event.pull_request.draft }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"

          echo "PR #${PR_NUMBER} | Author: ${AUTHOR} | Draft: ${IS_DRAFT}"

          # If the PR is still a draft, mark it ready for review.
          # This triggers the repo's "Automatically review pull requests" setting.
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Marking PR #${PR_NUMBER} as ready for review..."
            gh pr ready "$PR_NUMBER" --repo "$REPO" && \
              echo "✓ PR #${PR_NUMBER} is now ready for review." || \
              echo "✗ Could not mark PR ready (may already be ready)."
          else
            echo "PR is already ready for review."
          fi
