name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ai-glyphor-company
  GCP_REGION: us-central1
  AR_REPO: glyphor

jobs:
  # ─── Build & Test ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx turbo build

  # ─── Deploy Scheduler ─────────────────────────────────────
  deploy-scheduler:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push scheduler image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/scheduler:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/scheduler:latest"
          
          # Retry logic for transient failures
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Build attempt $attempt/$MAX_RETRIES"
            if docker build --progress=plain -f docker/Dockerfile.scheduler -t "$IMAGE" -t "$IMAGE_LATEST" .; then
              echo "Build succeeded on attempt $attempt"
              docker push "$IMAGE"
              docker push "$IMAGE_LATEST"
              exit 0
            else
              exit_code=$?
              echo "Build failed with exit code $exit_code"
              if [ $attempt -lt $MAX_RETRIES ]; then
                sleep $((10 * attempt))
                echo "Retrying..."
              else
                exit $exit_code
              fi
            fi
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy glyphor-scheduler \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/scheduler:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=1 \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db" \
            --update-env-vars="NODE_ENV=production,DB_HOST=/cloudsql/${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db,DB_NAME=glyphor,DB_USER=glyphor_app" \
            --update-secrets="DB_PASSWORD=db-password:latest,GOOGLE_AI_API_KEY=google-ai-api-key:latest,OPENAI_API_KEY=openai-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,GCS_BUCKET=gcs-bucket:latest,AZURE_TENANT_ID=azure-tenant-id:latest,AZURE_CLIENT_ID=azure-client-id:latest,AZURE_CLIENT_SECRET=azure-client-secret:latest,TEAMS_TEAM_ID=teams-team-id:latest,TEAMS_CHANNEL_BRIEFING_KRISTINA_ID=teams-channel-briefing-kristina-id:latest,TEAMS_CHANNEL_BRIEFING_ANDREW_ID=teams-channel-briefing-andrew-id:latest,TEAMS_CHANNEL_DECISIONS_ID=teams-channel-decisions-id:latest,TEAMS_CHANNEL_GENERAL_ID=teams-channel-general-id:latest,TEAMS_CHANNEL_ENGINEERING_ID=teams-channel-engineering-id:latest,TEAMS_CHANNEL_GROWTH_ID=teams-channel-growth-id:latest,TEAMS_CHANNEL_FINANCIALS_ID=teams-channel-financials-id:latest,TEAMS_CHANNEL_PRODUCT_FUSE_ID=teams-channel-product-fuse-id:latest,TEAMS_CHANNEL_PRODUCT_PULSE_ID=teams-channel-product-pulse-id:latest,BOT_APP_ID=bot-app-id:latest,BOT_APP_SECRET=bot-app-secret:latest,BOT_TENANT_ID=bot-tenant-id:latest,AGENT_BOTS=agent-bots:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,MERCURY_API_TOKEN=mercury-api-token:latest,SHAREPOINT_SITE_ID=sharepoint-site-id:latest"

  # ─── Deploy Dashboard ──────────────────────────────────────
  deploy-dashboard:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push dashboard image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/dashboard:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/dashboard:latest"
          
          # Retry logic for transient failures
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Build attempt $attempt/$MAX_RETRIES"
            if docker build --progress=plain -f docker/Dockerfile.dashboard \
              --build-arg VITE_SCHEDULER_URL="${{ secrets.VITE_SCHEDULER_URL }}" \
              --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
              -t "$IMAGE" -t "$IMAGE_LATEST" .; then
              echo "Build succeeded on attempt $attempt"
              docker push "$IMAGE"
              docker push "$IMAGE_LATEST"
              exit 0
            else
              exit_code=$?
              echo "Build failed with exit code $exit_code"
              if [ $attempt -lt $MAX_RETRIES ]; then
                sleep $((10 * attempt))
                echo "Retrying..."
              else
                exit $exit_code
              fi
            fi
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy glyphor-dashboard \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/dashboard:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --port=8080

  # ─── Deploy Worker ──────────────────────────────────────────
  deploy-worker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push worker image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/worker:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/worker:latest"
          
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Build attempt $attempt/$MAX_RETRIES"
            if docker build --progress=plain -f docker/Dockerfile.worker -t "$IMAGE" -t "$IMAGE_LATEST" .; then
              echo "Build succeeded on attempt $attempt"
              docker push "$IMAGE"
              docker push "$IMAGE_LATEST"
              exit 0
            else
              exit_code=$?
              echo "Build failed with exit code $exit_code"
              if [ $attempt -lt $MAX_RETRIES ]; then
                sleep $((10 * attempt))
                echo "Retrying..."
              else
                exit $exit_code
              fi
            fi
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy glyphor-worker \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/worker:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --concurrency=10 \
            --service-account=glyphor-worker@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db" \
            --update-env-vars="NODE_ENV=production,DB_HOST=/cloudsql/${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db,DB_NAME=glyphor,DB_USER=glyphor_system_user" \
            --update-secrets="DB_PASSWORD=db-password:latest,GOOGLE_AI_API_KEY=google-ai-api-key:latest,OPENAI_API_KEY=openai-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest"
