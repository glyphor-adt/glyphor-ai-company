name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ai-glyphor-company
  GCP_REGION: us-central1
  AR_REPO: glyphor
  REGISTRY: us-central1-docker.pkg.dev/ai-glyphor-company/glyphor

jobs:
  # ─── Typecheck gate — fail fast before Docker builds ──────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo build

  # ─── Deploy Scheduler ─────────────────────────────────────
  deploy-scheduler:
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push scheduler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.scheduler
          push: true
          tags: |
            ${{ env.REGISTRY }}/scheduler:${{ github.sha }}
            ${{ env.REGISTRY }}/scheduler:latest
          cache-from: type=gha,scope=scheduler
          cache-to: type=gha,mode=max,scope=scheduler

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy glyphor-scheduler \
            --image="${{ env.REGISTRY }}/scheduler:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=1 \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db" \
            --update-env-vars="NODE_ENV=production,DB_HOST=/cloudsql/${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db,DB_NAME=glyphor,DB_USER=glyphor_app,AGENT365_ENABLED=true,GLYPHOR_MCP_ENABLED=true,GLYPHOR_MCP_DATA_URL=https://glyphor-mcp-data-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_MARKETING_URL=https://glyphor-mcp-marketing-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_ENGINEERING_URL=https://glyphor-mcp-engineering-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_DESIGN_URL=https://glyphor-mcp-design-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_FINANCE_URL=https://glyphor-mcp-finance-610179349713.us-central1.run.app/mcp" \
            --update-secrets="DB_PASSWORD=db-password:latest,GOOGLE_AI_API_KEY=google-ai-api-key:latest,OPENAI_API_KEY=openai-api-key:latest,AZURE_FOUNDRY_ENDPOINT=azure-foundry-endpoint:latest,AZURE_FOUNDRY_API=azure-foundry-api:latest,GCS_BUCKET=gcs-bucket:latest,AZURE_TENANT_ID=azure-tenant-id:latest,AZURE_CLIENT_ID=azure-client-id:latest,AZURE_CLIENT_SECRET=azure-client-secret:latest,AGENT365_CLIENT_SECRET=agent365-client-secret:latest,AGENT365_CLIENT_ID=agent365-client-id:latest,AGENT365_TENANT_ID=azure-tenant-id:latest,TEAMS_TEAM_ID=teams-team-id:latest,TEAMS_CHANNEL_BRIEFING_KRISTINA_ID=teams-channel-briefing-kristina-id:latest,TEAMS_CHANNEL_BRIEFING_ANDREW_ID=teams-channel-briefing-andrew-id:latest,TEAMS_CHANNEL_DECISIONS_ID=teams-channel-decisions-id:latest,TEAMS_CHANNEL_GENERAL_ID=teams-channel-general-id:latest,TEAMS_CHANNEL_ENGINEERING_ID=teams-channel-engineering-id:latest,TEAMS_CHANNEL_GROWTH_ID=teams-channel-growth-id:latest,TEAMS_CHANNEL_FINANCIALS_ID=teams-channel-financials-id:latest,TEAMS_CHANNEL_PRODUCT_FUSE_ID=teams-channel-product-fuse-id:latest,TEAMS_CHANNEL_PRODUCT_PULSE_ID=teams-channel-product-pulse-id:latest,BOT_APP_ID=bot-app-id:latest,BOT_APP_SECRET=bot-app-secret:latest,BOT_TENANT_ID=bot-tenant-id:latest,AGENT_BOTS=agent-bots:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,MERCURY_API_TOKEN=mercury-api-token:latest,SHAREPOINT_SITE_ID=sharepoint-site-id:latest,SHAREPOINT_DRIVE_ID=sharepoint-drive-id:latest,SHAREPOINT_REGION=sharepoint-region:latest,OPENAI_ADMIN_KEY_FUSE=openai-admin-key-fuse:latest,OPENAI_ADMIN_KEY_PULSE=openai-admin-key-pulse:latest,OPENAI_ADMIN_KEY_COMPANY=openai-admin-key-company:latest,KLING_ACCESS_KEY=kling-access-key:latest,KLING_SECRET_KEY=kling-secret-key:latest,CANVA_CLIENT_ID=canva-client-id:latest,CANVA_CLIENT_SECRET=canva-client-secret:latest,CANVA_REFRESH_TOKEN=canva-refresh-token:latest"

  # ─── Deploy Dashboard ──────────────────────────────────────
  deploy-dashboard:
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.REGISTRY }}/dashboard:${{ github.sha }}
            ${{ env.REGISTRY }}/dashboard:latest
          build-args: |
            VITE_SCHEDULER_URL=${{ secrets.VITE_SCHEDULER_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy glyphor-dashboard \
            --image="${{ env.REGISTRY }}/dashboard:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --port=8080

  # ─── Deploy Worker ──────────────────────────────────────────
  deploy-worker:
