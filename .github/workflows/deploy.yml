  # ─── Deploy MCP Data Server ─────────────────────────────────
  deploy-mcp-data:
    needs: [typecheck, changes, migrate]
    if: needs.changes.outputs.mcp-data == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push mcp-data image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.mcp-data-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/mcp-data:${{ github.sha }}
            ${{ env.REGISTRY }}/mcp-data:latest
          cache-from: type=gha,scope=mcp-data
          cache-to: type=gha,mode=max,scope=mcp-data

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy glyphor-mcp-data \
            --image="${{ env.REGISTRY }}/mcp-data:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --service-account=glyphor-worker@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db" \
            --update-env-vars="NODE_ENV=production,DB_HOST=/cloudsql/${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db,DB_NAME=glyphor,DB_USER=glyphor_app" \
            --set-secrets="DB_PASSWORD=db-password:latest"

