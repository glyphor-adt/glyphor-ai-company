name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      agent_tracing_enabled:
        description: 'Override tracing toggle for this manual deploy (true/false). Leave empty to use repo variable.'
        required: false
        default: ''
        type: string
      tool_hooks_config_secret_name:
        description: 'Override Secret Manager secret name for TOOL_HOOKS_CONFIG for this manual deploy.'
        required: false
        default: ''
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ai-glyphor-company
  GCP_REGION: us-central1
  AR_REPO: glyphor
  REGISTRY: us-central1-docker.pkg.dev/ai-glyphor-company/glyphor
  AGENT_TRACING_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.agent_tracing_enabled != '' && github.event.inputs.agent_tracing_enabled || vars.AGENT_TRACING_ENABLED || 'false' }}
  TOOL_HOOKS_CONFIG_SECRET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tool_hooks_config_secret_name != '' && github.event.inputs.tool_hooks_config_secret_name || secrets.TOOL_HOOKS_CONFIG_SECRET_NAME }}
  AGENT_RUN_LEDGER_ENABLED: ${{ vars.AGENT_RUN_LEDGER_ENABLED || 'false' }}
  AGENT_PLANNING_POLICY_JSON: ${{ vars.AGENT_PLANNING_POLICY_JSON || '' }}
  PLANNING_GATE_ALERT_WINDOW_DAYS: ${{ vars.PLANNING_GATE_ALERT_WINDOW_DAYS || '30' }}
  PLANNING_GATE_ALERT_MIN_PLANNED_RUNS: ${{ vars.PLANNING_GATE_ALERT_MIN_PLANNED_RUNS || '10' }}
  PLANNING_GATE_ALERT_PASS_RATE_MIN: ${{ vars.PLANNING_GATE_ALERT_PASS_RATE_MIN || '0.70' }}
  PLANNING_GATE_ALERT_MAX_RETRY_THRESHOLD: ${{ vars.PLANNING_GATE_ALERT_MAX_RETRY_THRESHOLD || '2' }}
  # Stage 2: per-role 7d vs 30d anomaly detection (health API + dashboard; cron still uses critical alerts only).
  PLANNING_GATE_ALERT_MIN_ROLE_PLANNED_RUNS: ${{ vars.PLANNING_GATE_ALERT_MIN_ROLE_PLANNED_RUNS || '5' }}
  PLANNING_GATE_ALERT_ANOMALY_DROP_PP: ${{ vars.PLANNING_GATE_ALERT_ANOMALY_DROP_PP || '0.15' }}
  # When false, POST /admin/metrics/planning-gate-eval-suggestions/apply returns 403. Default on.
  PLANNING_GATE_EVAL_APPLY_ENABLED: ${{ vars.PLANNING_GATE_EVAL_APPLY_ENABLED || 'true' }}

jobs:
  # ─── Typecheck gate — fail fast before Docker builds ──────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo build

  # ─── Apply pending database migrations ────────────────────
  migrate:
    needs: [typecheck]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Start Cloud SQL Proxy
        run: |
          gcloud components install cloud-sql-proxy --quiet 2>/dev/null || true
          cloud-sql-proxy ${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db \
            --port=5432 --quiet &
          sleep 3

      - name: Apply pending migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          DB_NAME: glyphor
          DB_USER: glyphor_app
        run: |
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=db-password --project=${{ env.GCP_PROJECT_ID }})
          export DB_PASSWORD
          npx tsx scripts/apply-pending-migrations.ts --source ci-deploy

  # ─── Detect which services need deploying ──────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      scheduler: ${{ steps.filter.outputs.scheduler }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      worker: ${{ steps.filter.outputs.worker }}
      mcp-data: ${{ steps.filter.outputs.mcp-data }}
      mcp-marketing: ${{ steps.filter.outputs.mcp-marketing }}
      mcp-engineering: ${{ steps.filter.outputs.mcp-engineering }}
      mcp-design: ${{ steps.filter.outputs.mcp-design }}
      mcp-finance: ${{ steps.filter.outputs.mcp-finance }}
      mcp-sharepoint-sites: ${{ steps.filter.outputs.mcp-sharepoint-sites }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scheduler:
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.scheduler'
              - 'packages/scheduler/**'
              - 'packages/agent-runtime/**'
              - 'packages/agents/**'
              - 'packages/company-memory/**'
              - 'packages/company-knowledge/**'
              - 'packages/integrations/**'
              - 'packages/shared/**'
              - 'ToolingManifest.json'
            dashboard:
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'packages/dashboard/**'
              - 'docker/Dockerfile.dashboard'
              - 'docker/nginx.conf'
            worker:
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.worker'
              - 'packages/worker/**'
              - 'packages/shared/**'
              - 'packages/agent-runtime/**'
              - 'packages/agents/**'
              - 'packages/company-memory/**'
              - 'packages/integrations/**'
            mcp-data:
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.mcp-data-server'
              - 'packages/mcp-data-server/**'
            mcp-marketing:
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.mcp-marketing-server'
              - 'packages/mcp-marketing-server/**'
            mcp-engineering:
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.mcp-engineering-server'
              - 'packages/mcp-engineering-server/**'
            mcp-design:
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.mcp-design-server'
              - 'packages/mcp-design-server/**'
            mcp-finance:
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.mcp-finance-server'
              - 'packages/mcp-finance-server/**'
            mcp-sharepoint-sites:
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'docker/Dockerfile.mcp-sharepoint-sites'
              - 'packages/mcp-sharepoint-sites/**'

  # ─── Deploy Scheduler ─────────────────────────────────────
  deploy-scheduler:
    needs: [typecheck, changes, migrate]
    if: needs.changes.outputs.scheduler == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build Agent365 role secret mappings
        id: agent365-role-secrets
        shell: bash
        run: |
          mappings="AGENT365_CFO_CLIENT_SECRET=agent365-cfo-client-secret:latest,AGENT365_SOCIAL_MEDIA_MANAGER_CLIENT_SECRET=agent365-social-media-manager-client-secret:latest"
          echo "mappings=$mappings" >> "$GITHUB_OUTPUT"

      - name: Validate scheduler secrets exist
        shell: bash
        run: |
          set -euo pipefail
          required_secrets=(
            db-password
            e2b-api-key
            google-ai-api-key
            azure-foundry-endpoint
            azure-foundry-api
            gcs-bucket
            azure-tenant-id
            azure-client-id
            azure-client-secret
            agent365-client-secret
            agent365-client-id
            agent365-cfo-client-secret
            agent365-social-media-manager-client-secret
            teams-team-id
            teams-channel-briefings-id
            teams-channel-decisions-id
            teams-channel-general-id
            teams-channel-engineering-id
            teams-channel-growth-id
            teams-channel-financials-id
            teams-channel-alerts-id
            teams-channel-deliverables-id
            teams-founder-kristina-aad-id
            teams-founder-andrew-aad-id
            stripe-secret-key
            mercury-api-token
            sharepoint-site-id
            sharepoint-drive-id
            sharepoint-region
            openai-admin-key-fuse
            openai-admin-key-pulse
            openai-admin-key-company
            kling-access-key
            kling-secret-key
            canva-client-id
            canva-client-secret
            canva-refresh-token
            anthropic-admin-key-fuse
            anthropic-admin-key-pulse
            anthropic-admin-key-company
            github-token
            fuse-github-service-pat
            fuse-preview-vercel-token
            fuse-preview-vercel-team-id
            PREVIEWS_R2_ENDPOINT
            PREVIEWS_R2_ACCESS_KEY_ID
            PREVIEWS_R2_SECRET_ACCESS_KEY
            gcp-project-id
            pulse-service-role-key
            pulse-mcp-endpoint
            fuse-github-app-id
            fuse-github-app-private-key
            fuse-GLYPHOR_INSTALLATION_ID
            facebook-app-id
            facebook-app-secret
            facebook-page-access-token
            facebook-page-id
            facebook-business-account-id
            linkedin-client-id
            linkedin-client-secret
            linkedin-refresh-token
            linkedin-organization-id
            graph-delegated-refresh-token
          )

          if [[ -n "${{ env.TOOL_HOOKS_CONFIG_SECRET }}" ]]; then
            required_secrets+=("${{ env.TOOL_HOOKS_CONFIG_SECRET }}")
          fi

          missing_secrets=()
          for secret_name in "${required_secrets[@]}"; do
            if ! gcloud secrets describe "$secret_name" --project="${{ env.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
              missing_secrets+=("$secret_name")
            fi
          done

          if ((${#missing_secrets[@]} > 0)); then
            echo "::error title=Missing Secret Manager secrets::Deploy prerequisites failed for glyphor-scheduler."
            printf 'Missing secrets:\n'
            printf '  - %s\n' "${missing_secrets[@]}"
            exit 1
          fi

      - name: Build & push scheduler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.scheduler
          push: true
          tags: |
            ${{ env.REGISTRY }}/scheduler:${{ github.sha }}
            ${{ env.REGISTRY }}/scheduler:latest
          cache-from: type=gha,scope=scheduler
          cache-to: type=gha,mode=max,scope=scheduler

      - name: Deploy to Cloud Run
        run: |
          AGENT365_ROLE_SECRETS="${{ steps.agent365-role-secrets.outputs.mappings }}"
          HOOKS_SECRET_ARG=""
          if [[ -n "${{ env.TOOL_HOOKS_CONFIG_SECRET }}" ]]; then
            HOOKS_SECRET_ARG=",TOOL_HOOKS_CONFIG=${{ env.TOOL_HOOKS_CONFIG_SECRET }}:latest"
          fi
          gcloud run deploy glyphor-scheduler \
            --image="${{ env.REGISTRY }}/scheduler:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=2 \
            --cpu-boost \
            --no-cpu-throttling \
            --min-instances=1 \
            --max-instances=1 \
            --port=8080 \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db" \
            --update-env-vars="NODE_ENV=production,DB_HOST=/cloudsql/${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db,DB_NAME=glyphor,DB_USER=glyphor_app,AGENT365_ENABLED=true,AGENT_TRACING_ENABLED=${{ env.AGENT_TRACING_ENABLED }},AGENT_RUN_LEDGER_ENABLED=${{ env.AGENT_RUN_LEDGER_ENABLED }},AGENT_PLANNING_POLICY_JSON=${{ env.AGENT_PLANNING_POLICY_JSON }},PLANNING_GATE_ALERT_WINDOW_DAYS=${{ env.PLANNING_GATE_ALERT_WINDOW_DAYS }},PLANNING_GATE_ALERT_MIN_PLANNED_RUNS=${{ env.PLANNING_GATE_ALERT_MIN_PLANNED_RUNS }},PLANNING_GATE_ALERT_PASS_RATE_MIN=${{ env.PLANNING_GATE_ALERT_PASS_RATE_MIN }},PLANNING_GATE_ALERT_MAX_RETRY_THRESHOLD=${{ env.PLANNING_GATE_ALERT_MAX_RETRY_THRESHOLD }},PLANNING_GATE_ALERT_MIN_ROLE_PLANNED_RUNS=${{ env.PLANNING_GATE_ALERT_MIN_ROLE_PLANNED_RUNS }},PLANNING_GATE_ALERT_ANOMALY_DROP_PP=${{ env.PLANNING_GATE_ALERT_ANOMALY_DROP_PP }},PLANNING_GATE_EVAL_APPLY_ENABLED=${{ env.PLANNING_GATE_EVAL_APPLY_ENABLED }},GLYPHOR_MCP_ENABLED=true,GLYPHOR_MCP_DATA_URL=https://glyphor-mcp-data-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_MARKETING_URL=https://glyphor-mcp-marketing-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_ENGINEERING_URL=https://glyphor-mcp-engineering-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_DESIGN_URL=https://glyphor-mcp-design-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_FINANCE_URL=https://glyphor-mcp-finance-610179349713.us-central1.run.app/mcp,GLYPHOR_MCP_SHAREPOINT_SITES_URL=https://glyphor-mcp-sharepoint-sites-610179349713.us-central1.run.app/mcp,DASHBOARD_URL=https://glyphor-dashboard-610179349713.us-central1.run.app,PUBLIC_URL=https://glyphor-scheduler-610179349713.us-central1.run.app,WEBSITE_PIPELINE_FEATURE_BRANCH_REPOS=glyphor-adt/glyphor-site,WEB_BUILD_INCREMENTAL_PATCH_ROUNDS=3" \
              --set-secrets="DB_PASSWORD=db-password:latest,E2B_API_KEY=e2b-api-key:latest,GOOGLE_AI_API_KEY=google-ai-api-key:latest,AZURE_FOUNDRY_ENDPOINT=azure-foundry-endpoint:latest,AZURE_FOUNDRY_API=azure-foundry-api:latest,GCS_BUCKET=gcs-bucket:latest,AZURE_TENANT_ID=azure-tenant-id:latest,AZURE_CLIENT_ID=azure-client-id:latest,AZURE_CLIENT_SECRET=azure-client-secret:latest,AGENT365_CLIENT_SECRET=agent365-client-secret:latest,AGENT365_CLIENT_ID=agent365-client-id:latest,AGENT365_TENANT_ID=azure-tenant-id:latest${AGENT365_ROLE_SECRETS:+,${AGENT365_ROLE_SECRETS}}${HOOKS_SECRET_ARG},WORKER_SHARED_SECRET=worker-shared-secret:latest,TEAMS_TEAM_ID=teams-team-id:latest,TEAMS_CHANNEL_BRIEFINGS_ID=teams-channel-briefings-id:latest,TEAMS_CHANNEL_DECISIONS_ID=teams-channel-decisions-id:latest,TEAMS_CHANNEL_GENERAL_ID=teams-channel-general-id:latest,TEAMS_CHANNEL_ENGINEERING_ID=teams-channel-engineering-id:latest,TEAMS_CHANNEL_GROWTH_ID=teams-channel-growth-id:latest,TEAMS_CHANNEL_FINANCIALS_ID=teams-channel-financials-id:latest,TEAMS_CHANNEL_ALERTS_ID=teams-channel-alerts-id:latest,TEAMS_CHANNEL_DELIVERABLES_ID=teams-channel-deliverables-id:latest,TEAMS_FOUNDER_KRISTINA_AAD_ID=teams-founder-kristina-aad-id:latest,TEAMS_FOUNDER_ANDREW_AAD_ID=teams-founder-andrew-aad-id:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,MERCURY_API_TOKEN=mercury-api-token:latest,SHAREPOINT_SITE_ID=sharepoint-site-id:latest,SHAREPOINT_DRIVE_ID=sharepoint-drive-id:latest,SHAREPOINT_REGION=sharepoint-region:latest,OPENAI_ADMIN_KEY_WEB_BUILD=openai-admin-key-fuse:latest,OPENAI_ADMIN_KEY_PULSE=openai-admin-key-pulse:latest,OPENAI_ADMIN_KEY_COMPANY=openai-admin-key-company:latest,KLING_ACCESS_KEY=kling-access-key:latest,KLING_SECRET_KEY=kling-secret-key:latest,CANVA_CLIENT_ID=canva-client-id:latest,CANVA_CLIENT_SECRET=canva-client-secret:latest,CANVA_REFRESH_TOKEN=canva-refresh-token:latest,ANTHROPIC_ADMIN_KEY_WEB_BUILD=anthropic-admin-key-fuse:latest,ANTHROPIC_ADMIN_KEY_PULSE=anthropic-admin-key-pulse:latest,ANTHROPIC_ADMIN_KEY_COMPANY=anthropic-admin-key-company:latest,GITHUB_TOKEN=github-token:latest,GITHUB_SERVICE_PAT=fuse-github-service-pat:latest,VERCEL_API_TOKEN=fuse-preview-vercel-token:latest,VERCEL_TEAM_ID=fuse-preview-vercel-team-id:latest,PREVIEWS_R2_ENDPOINT=PREVIEWS_R2_ENDPOINT:latest,PREVIEWS_R2_ACCESS_KEY_ID=PREVIEWS_R2_ACCESS_KEY_ID:latest,PREVIEWS_R2_SECRET_ACCESS_KEY=PREVIEWS_R2_SECRET_ACCESS_KEY:latest,GCP_PROJECT_ID=gcp-project-id:latest,PULSE_SERVICE_ROLE_KEY=pulse-service-role-key:latest,PULSE_MCP_ENDPOINT=pulse-mcp-endpoint:latest,GITHUB_APP_ID=fuse-github-app-id:latest,GITHUB_APP_PRIVATE_KEY=fuse-github-app-private-key:latest,GITHUB_INSTALLATION_ID=fuse-GLYPHOR_INSTALLATION_ID:latest,FACEBOOK_APP_ID=facebook-app-id:latest,FACEBOOK_APP_SECRET=facebook-app-secret:latest,FACEBOOK_LONG_LIVED_PAGE_ACCESS_TOKEN=facebook-page-access-token:latest,FACEBOOK_PAGE_ID=facebook-page-id:latest,FACEBOOK_BUSINESS_ACCOUNT_ID=facebook-business-account-id:latest,LINKEDIN_CLIENT_ID=linkedin-client-id:latest,LINKEDIN_CLIENT_SECRET=linkedin-client-secret:latest,LINKEDIN_REFRESH_TOKEN=linkedin-refresh-token:latest,LINKEDIN_ORGANIZATION_ID=linkedin-organization-id:latest,GRAPH_DELEGATED_REFRESH_TOKEN=graph-delegated-refresh-token:latest"

  # ─── Deploy Dashboard ──────────────────────────────────────
  deploy-dashboard:
    needs: [typecheck, changes, migrate]
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.REGISTRY }}/dashboard:${{ github.sha }}
            ${{ env.REGISTRY }}/dashboard:latest
          build-args: |
            VITE_SCHEDULER_URL=${{ secrets.VITE_SCHEDULER_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy glyphor-dashboard \
            --image="${{ env.REGISTRY }}/dashboard:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=4Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --port=8080

  # ─── Deploy Worker ──────────────────────────────────────────
  deploy-worker:
    needs: [typecheck, changes, migrate]
    if: needs.changes.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Deploy to Cloud Run
        run: |
          HOOKS_SECRET_ARG=""
          if [[ -n "${{ env.TOOL_HOOKS_CONFIG_SECRET }}" ]]; then
            HOOKS_SECRET_ARG=",TOOL_HOOKS_CONFIG=${{ env.TOOL_HOOKS_CONFIG_SECRET }}:latest"
          fi
          gcloud run deploy glyphor-worker \
            --image="${{ env.REGISTRY }}/worker:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --concurrency=10 \
            --service-account=glyphor-worker@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:glyphor-db" \
