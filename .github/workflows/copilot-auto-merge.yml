name: Auto-merge PRs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request_review:
    types: [submitted]
  # Re-check when our own workflow marks a PR ready
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge PRs with passing CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all open non-draft PRs targeting main
          PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base main \
            --state open \
            --json number,isDraft,title,author \
            --jq '.[] | select(.isDraft == false) | .number')

          if [ -z "$PRS" ]; then
            echo "No open non-draft PRs found."
            exit 0
          fi

          for PR in $PRS; do
            echo "Checking PR #$PR..."

            # Check CI status — require at least one check and all must pass
            CI_STATUS=$(gh pr checks "$PR" \
              --repo "${{ github.repository }}" \
              --json name,state \
              --jq '[.[] | select(.name | test("CI/|Build"))] | if length == 0 then "pending" elif any(.state == "PENDING" or .state == "QUEUED" or .state == "IN_PROGRESS") then "pending" elif all(.state == "SUCCESS" or .state == "SKIPPED") then "pass" else "fail" end' 2>/dev/null || echo "pending")

            echo "  CI: $CI_STATUS"

            if [ "$CI_STATUS" = "pass" ]; then
              echo "  Merging PR #$PR..."
              gh pr merge "$PR" \
                --repo "${{ github.repository }}" \
                --squash \
                --delete-branch && \
              echo "  ✓ Merged PR #$PR." || \
              echo "  ✗ Could not merge PR #$PR."
            elif [ "$CI_STATUS" = "fail" ]; then
              echo "  PR #$PR CI failed — skipping."
            else
              echo "  PR #$PR CI still running — skipping."
            fi
          done
