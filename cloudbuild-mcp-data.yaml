steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--progress=plain'
      - '-f'
      - 'docker/Dockerfile.mcp-data-server'
      - '-t'
      - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/mcp-data-server:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
images:
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/mcp-data-server:latest'
options:
  logging: CLOUD_LOGGING_ONLY
timeout: '600s'
