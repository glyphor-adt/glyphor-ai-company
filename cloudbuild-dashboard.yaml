steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--progress=plain'
      - '-f'
      - 'docker/Dockerfile.dashboard'
      - '--build-arg'
      - 'VITE_SCHEDULER_URL=https://glyphor-scheduler-v55622rp6q-uc.a.run.app'
      - '--build-arg'
      - 'VITE_API_URL=https://glyphor-scheduler-v55622rp6q-uc.a.run.app'
      - '--build-arg'
      - 'VITE_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - '--build-arg'
      - 'VITE_VOICE_GATEWAY_URL=https://glyphor-voice-gateway-610179349713.us-central1.run.app'
      - '-t'
      - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/dashboard:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
images:
  - 'us-central1-docker.pkg.dev/ai-glyphor-company/glyphor/dashboard:latest'

# Improved logging and reliability
options:
  logging: CLOUD_LOGGING_ONLY
  logStreamingOption: STREAM_ON

timeout: '600s'
